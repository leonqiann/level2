{% extends "layout.html" %}
{% block body %}
<!--home page-->
<!--3 column grid -->
<div class="five-column">
    {% for song in results %}
    <a href="{{ url_for('song', id=song[0])}}">
    <div class="w3-card-4">
        <!--the name then the image-->
       <div class="image-hover"><h1>{{ song[1] }} {{ song[2] }} {{ song[4]}}</h1></div>
        <img src="{{ song[8] }}" alt="{{ song[0] }}">
    </div>
</a>
    {% endfor %}
</div>

{% endblock %}
